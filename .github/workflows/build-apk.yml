name: Build and Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK (with Obfuscation)
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols --build-name=$VERSION --build-number=${{ github.run_number }}
          else
            flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols
          fi
        shell: bash

      - name: Sign APK (V2, V3, V4)
        run: |
          # Generate ephemeral keystore for signing
          keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass password123 -keypass password123 -dname "CN=ELibrary, OU=Dev, O=ELibrary, L=Jakarta, ST=DKI, C=ID"
          
          # Find the latest apksigner
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -r | head -n 1)
          
          # Sign the APK with V2, V3, and V4
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          $APKSIGNER sign --ks release.keystore --ks-pass pass:password123 --v2-signing-enabled true --v3-signing-enabled true --v4-signing-enabled true $APK_PATH
        shell: bash

      - name: Upload APK and Signature Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-release.apk.idsig

